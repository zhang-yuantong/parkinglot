<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>停车场查询</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; color: #666; font-size: 14px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
        input[type="checkbox"] { width: 18px; height: 18px; }
        .checkbox-label { font-size: 14px; color: #666; }
        button { width: 100%; padding: 14px; background: #10b981; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:disabled { background: #ccc; }
        .result { margin-top: 20px; }
        .parking-item { padding: 16px; border-bottom: 1px solid #eee; }
        .parking-item:last-child { border-bottom: none; }
        .parking-name { font-weight: bold; color: #333; margin-bottom: 4px; }
        .parking-address { font-size: 14px; color: #666; margin-bottom: 8px; }
        .parking-info { display: flex; gap: 16px; font-size: 14px; }
        .info-item { color: #888; }
        .info-value { color: #333; font-weight: 500; }
        .loading { text-align: center; color: #666; padding: 20px; }
        .error { color: #ef4444; text-align: center; padding: 20px; }
        .distance-badge { background: #e0f2fe; color: #0284c7; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .nav-btn { display: inline-block; margin-top: 8px; padding: 8px 16px; background: #3b82f6; color: white; text-decoration: none; border-radius: 6px; font-size: 14px; }
        .current-location { font-size: 12px; color: #0284c7; margin-top: 4px; }
        .radio-group { display: flex; flex-wrap: wrap; gap: 12px; }
        .radio-group label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
        input[type="radio"] { width: 16px; height: 16px; }
        .info-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 14px; flex-wrap: wrap; }
        .info-item { color: #64748b; }
        .info-value { color: #334155; font-weight: 500; }
        .info-value.total { color: #16a34a; font-weight: bold; }
        .info-divider { color: #cbd5e1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🅿️ 停车场查询</h1>
        
        <div class="input-group">
            <label>目的地</label>
            <input type="text" id="endAddress" placeholder="">
            <div class="current-location">📍 出发地：自动获取当前位置</div>
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="addBeijing" checked>
            <label for="addBeijing" class="checkbox-label">自动添加「北京」前缀</label>
        </div>
        
        <div class="input-group">
            <label>搜索半径</label>
            <div class="radio-group">
                <label><input type="radio" name="radius" value="150" checked> 150米</label>
                <label><input type="radio" name="radius" value="200"> 200米</label>
                <label><input type="radio" name="radius" value="300"> 300米</label>
                <label><input type="radio" name="radius" value="500"> 500米</label>
            </div>
        </div>
        
        <button id="searchBtn">搜索停车场</button>
        
        <div id="result"></div>
    </div>

    <script>
        const AMAP_KEY = '91705d6ebf9bc6694bc54a1a5197188e';
        
        async function geocode(address) {
            const url = `https://restapi.amap.com/v3/geocode/geo?address=${encodeURIComponent(address)}&key=${AMAP_KEY}`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (data.status === '1' && data.geocodes && data.geocodes.length > 0) {
                const [lng, lat] = data.geocodes[0].location.split(',').map(Number);
                return { lng, lat };
            }
            return null;
        }
        
        async function searchParkings(lng, lat, radius) {
            const url = `https://restapi.amap.com/v3/place/around?key=${AMAP_KEY}&location=${lng},${lat}&radius=${radius}&types=150900&offset=20`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (data.status === '1' && data.pois) {
                return data.pois.map(poi => {
                    const [plng, plat] = poi.location.split(',').map(Number);
                    return {
                        name: poi.name,
                        address: poi.address || '未知地址',
                        lng: plng,
                        lat: plat,
                        distance: parseInt(poi.distance) || 0
                    };
                });
            }
            return [];
        }
        
        async function getRoute(origin, dest, strategy = 10) {
            const url = `https://restapi.amap.com/v3/direction/driving?key=${AMAP_KEY}&origin=${origin.lng},${origin.lat}&destination=${dest.lng},${dest.lat}&strategy=${strategy}`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (data.status === '1' && data.route && data.route.paths && data.route.paths.length > 0) {
                const path = data.route.paths[0];
                return {
                    distance: parseFloat(path.distance) / 1000,
                    duration: parseFloat(path.duration) / 60
                };
            }
            return null;
        }
        
        async function getWalkingRoute(origin, dest) {
            const url = `https://restapi.amap.com/v3/direction/walking?key=${AMAP_KEY}&origin=${origin.lng},${origin.lat}&destination=${dest.lng},${dest.lat}`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (data.status === '1' && data.route && data.route.paths && data.route.paths.length > 0) {
                const path = data.route.paths[0];
                return {
                    distance: parseFloat(path.distance),
                    duration: parseFloat(path.duration) / 60
                };
            }
            return null;
        }
        
        async function search() {
            const endAddr = document.getElementById('endAddress').value.trim();
            const addBeijing = document.getElementById('addBeijing').checked;
            const radius = parseInt(document.querySelector('input[name="radius"]:checked').value);
            
            if (!endAddr) {
                document.getElementById('result').innerHTML = '<div class="error">请输入目的地</div>';
                return;
            }
            
            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.textContent = '搜索中...';
            document.getElementById('result').innerHTML = '<div class="loading">正在获取当前位置...</div>';
            
            try {
                // 获取当前位置（默认起点）
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000
                    });
                });
                const startPoint = { lng: position.coords.longitude, lat: position.coords.latitude };
                
                // 解析终点（根据勾选决定是否添加北京前缀）
                const finalAddr = addBeijing ? '北京' + endAddr : endAddr;
                const endPoint = await geocode(finalAddr);
                if (!endPoint) {
                    throw new Error('终点地址解析失败');
                }
                
                // 搜索附近停车场（20个）
                const parkings = await searchParkings(endPoint.lng, endPoint.lat, radius);
                if (parkings.length === 0) {
                    document.getElementById('result').innerHTML = '<div class="error">附近没有找到停车场</div>';
                    return;
                }
                
                // 为每个停车场规划路线（并发请求）
                document.getElementById('result').innerHTML = '<div class="loading">正在规划路线...</div>';
                
                const routePromises = parkings.map(async parking => {
                    const route = await getRoute(startPoint, parking);
                    if (route) {
                        const walk = await getWalkingRoute(parking, endPoint);
                        return {
                            ...parking,
                            ...route,
                            walkDistance: walk?.distance || null,
                            walkDuration: walk?.duration || null
                        };
                    }
                    return null;
                });
                
                const results = (await Promise.all(routePromises)).filter(Boolean);
                
                if (results.length === 0) {
                    document.getElementById('result').innerHTML = '<div class="error">路线规划失败</div>';
                    return;
                }
                
                // 按导航时间排序
                results.sort((a, b) => a.duration - b.duration);
                
                // 去重：名称或地址前5个字符相同的只保留最快的
                const seenNames = new Set();
                const seenAddresses = new Set();
                const uniqueResults = results.filter(parking => {
                    const namePrefix = parking.name.substring(0, 5);
                    const addrPrefix = parking.address.substring(0, 5);
                    if (seenNames.has(namePrefix) || seenAddresses.has(addrPrefix)) {
                        return false;
                    }
                    seenNames.add(namePrefix);
                    seenAddresses.add(addrPrefix);
                    return true;
                });
                
                // 取最快的5个
                const top5 = uniqueResults.slice(0, 5);
                
                // 显示结果
                let html = '<div class="result">';
                top5.forEach((p, i) => {
                    const walkTime = p.walkDuration || 2;
                    const totalTime = p.duration + walkTime;
                    html += `
                        <div class="parking-item">
                            <div class="parking-name">${i + 1}. ${p.name}</div>
                            <div class="parking-address">${p.address}</div>
                            <div class="info-row">
                                <span class="info-item">驾车时长: <span class="info-value">${p.duration.toFixed(1)}分钟</span></span>
                                <span class="info-divider">|</span>
                                <span class="info-item">步行时长: <span class="info-value">${walkTime.toFixed(1)}分钟</span></span>
                                <span class="info-divider">|</span>
                                <span class="info-item">总计时长: <span class="info-value total">${totalTime.toFixed(1)}分钟</span></span>
                                <span class="info-divider">|</span>
                                <span class="info-item">驾车距离: <span class="info-value">${p.distance.toFixed(1)}公里</span></span>
                            </div>
                            <a href="https://uri.amap.com/navigation?from=${startPoint.lng},${startPoint.lat}&to=${p.lng},${p.lat}&mode=car" class="nav-btn" target="_blank">导航去这里</a>
                        </div>
                    `;
                });
                html += '</div>';
                
                document.getElementById('result').innerHTML = html;
                
            } catch (error) {
                if (error.message.includes('Position')) {
                    document.getElementById('result').innerHTML = '<div class="error">无法获取当前位置，请确保已开启定位权限</div>';
                } else {
                    document.getElementById('result').innerHTML = `<div class="error">${error.message}</div>`;
                }
            } finally {
                btn.disabled = false;
                btn.textContent = '搜索停车场';
            }
        }
        
        document.getElementById('searchBtn').addEventListener('click', search);
    </script>
</body>
</html>
